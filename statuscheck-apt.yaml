---
- name: Update Server and Send Report
  hosts: all
  become: true
  tasks:
    - name: Notify Start
      uri:
        url: "https://api.telegram.org/bot{{ TELEGRAM_TOKEN }}/sendMessage"
        method: POST
        body_format: json
        body:
          chat_id: "{{ TELEGRAM_CHAT_ID }}"
          parse_mode: "Markdown"
          text: |
            🚀 *Server Maintenance Started*
            Host: `{{ inventory_hostname }}`

    - block:
        - name: Gather facts
          setup:

        - name: Check if python3 is installed
          command: python3 --version
          register: python_check
          changed_when: false
          failed_when: false

        - name: Check if pip3 is installed
          command: pip3 --version
          register: pip_check
          changed_when: false
          failed_when: false

        - name: Check if speedtest-cli is installed
          command: which speedtest-cli
          register: speedtest_check
          changed_when: false
          failed_when: false

        - name: Install python3 and pip3 if missing
          apt:
            name:
              - python3
              - python3-pip
            state: present
            update_cache: yes
          when: python_check.rc != 0 or pip_check.rc != 0

        - name: Install speedtest-cli via apt if missing
          apt:
            name: speedtest-cli
            state: present
            update_cache: yes
          register: speedtest_apt
          failed_when: false
          when: speedtest_check.rc != 0

        - name: Install speedtest-cli via pip as fallback (PEP 668 safe)
          pip:
            name: speedtest-cli
            state: present
            extra_args: "--break-system-packages"
          when:
            - speedtest_check.rc != 0
            - speedtest_apt.failed is defined and speedtest_apt.failed

        - name: Check available updates
          shell: apt list --upgradable 2>/dev/null
          register: updates_before
          changed_when: false
          failed_when: false

        - name: Upgrade all packages
          apt:
            name: "*"
            state: latest
            update_cache: yes

        - name: Run speed test
          command: speedtest-cli --simple
          register: speedtest_result
          changed_when: false

        - name: Check reboot requirement
          stat:
            path: /var/run/reboot-required
          register: reboot_required

        - name: Send Success Report
          uri:
            url: "https://api.telegram.org/bot{{ TELEGRAM_TOKEN }}/sendMessage"
            method: POST
            body_format: json
            body:
              chat_id: "{{ TELEGRAM_CHAT_ID }}"
              parse_mode: "Markdown"
              text: |
                ✅ *Server Maintenance Complete*
                Host: `{{ inventory_hostname }}`
                OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
                Python: {{ python_check.stdout | default('Installed During Run') }}
                Pip: {{ pip_check.stdout | default('Installed During Run') }}
                Speedtest: {{ 'Already Installed' if speedtest_check.rc == 0 else 'Installed During Run' }}
                Reboot Required: {{ reboot_required.stat.exists }}
                Speed Test:
                ```
                {{ speedtest_result.stdout }}
                ```

      rescue:
        - name: Send Failure Report
          uri:
            url: "https://api.telegram.org/bot{{ TELEGRAM_TOKEN }}/sendMessage"
            method: POST
            body_format: json
            body:
              chat_id: "{{ TELEGRAM_CHAT_ID }}"
              parse_mode: "Markdown"
              text: |
                ❌ *Server Maintenance Failed*
                Host: `{{ inventory_hostname }}`
                Failed Task: {{ ansible_failed_task.name }}
                Error: {{ ansible_failed_result.msg | default(ansible_failed_result.stderr, true) }}

      always:
        - name: Workflow Finished
          debug:
            msg: "Workflow execution completed."
